<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Lahore Grill House Instagram grid mockup</title>
  <desc id="desc">A branded nine post Instagram grid for Lahore Grill House with restaurant food and promotional tiles.</desc>
  <defs>
