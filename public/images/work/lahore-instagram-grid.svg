      .small{font:700 16px Arial,sans-serif;fill:#fff;letter-spacing:3px}
      .script{font:italic 56px Georgia,serif;fill:#f6a629}
      .headline{font:900 56px Arial,sans-serif;fill:#fff;letter-spacing:1px}
      .copy{font:700 28px Arial,sans-serif;fill:#fff}
