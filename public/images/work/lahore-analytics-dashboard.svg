<svg xmlns="http://www.w3.org/2000/svg" width="1448" height="1078" viewBox="0 0 1448 1078" role="img" aria-labelledby="title desc">
  <title id="title">Lahore Grill House social media analytics dashboard</title>
  <desc id="desc">A dark blue 90 day performance dashboard showing follower growth, reach, impressions, engagement and top reel performance for Lahore Grill House.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#071121"/><stop offset="1" stop-color="#020914"/></linearGradient>
    <linearGradient id="blue" x1="0" x2="1"><stop stop-color="#2d66ff"/><stop offset="1" stop-color="#0ad4ff"/></linearGradient>
    <style>
      .card{fill:#07182b;stroke:#173154;stroke-width:2}
      .muted{fill:#9aa8bd;font:22px Arial,sans-serif}
      .label{fill:#fff;font:700 25px Arial,sans-serif}
      .big{fill:#fff;font:800 46px Arial,sans-serif}
      .green{fill:#64e978;font:700 20px Arial,sans-serif}
      .blueText{fill:#2f73ff;font:800 48px Arial,sans-serif}
    </style>
  </defs>
  <rect width="1448" height="1078" rx="28" fill="url(#bg)"/>
  <rect x="10" y="10" width="1428" height="1058" rx="28" fill="none" stroke="#16304f" stroke-width="2"/>
